# Wraps ../../rbac.yaml's Role/RoleBinding for the sandbox manager (the
# control plane / SandboxManager process) -- see that file's comments for
# the full rationale, including the documented KNOWN LIMITATION that
# Kubernetes RBAC cannot scope these verbs to only sandbox-labeled
# pods/secrets, and the dedicated-namespace mitigation that implies.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-manager-role
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "boxkite.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: [""]
  resources: ["pods/status"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
  resourceNames: ["sandbox-config"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create", "delete"]
- apiGroups: [""]
  resources: ["serviceaccounts/token"]
  verbs: ["create"]
  resourceNames: [{{ .Values.controlPlaneServiceAccountName | quote }}]
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["get", "create", "update", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-manager-binding
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "boxkite.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.controlPlaneServiceAccountName }}
  namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: sandbox-manager-role
  apiGroup: rbac.authorization.k8s.io
