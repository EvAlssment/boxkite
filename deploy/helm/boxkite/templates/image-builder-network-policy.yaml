# Wraps ../../image-builder-network-policy.yaml -- see that file's header
# comment IN FULL before applying. OFF by default (imageBuilder.enabled:
# false). Same fail-closed discipline as the raw manifest: the CIDR values
# default to a non-routable RFC 5737 placeholder, so enabling the builder
# without also setting real registry CIDRs gives egress to nothing rather
# than silently falling back to 0.0.0.0/0.
{{- if .Values.imageBuilder.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: boxkite-image-builder-network-policy
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "boxkite.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: boxkite-image-builder
  policyTypes:
  - Ingress
  - Egress
  ingress: []
  egress:
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to:
    - ipBlock:
        cidr: {{ .Values.imageBuilder.networkPolicy.packageRegistryCidr }}
    ports:
    - protocol: TCP
      port: 443
  - to:
    - ipBlock:
        cidr: {{ .Values.imageBuilder.networkPolicy.registryCidr }}
    ports:
    - protocol: TCP
      port: 443
{{- end }}
