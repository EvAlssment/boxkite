# Wraps ../../rbac.yaml's sandbox-s3-credentials Secret. Empty by default,
# same as the raw manifest -- fill in via `--set` / a values override file
# you do NOT commit, or better, manage this Secret out-of-band (IRSA/
# Workload Identity, external-secrets, sealed-secrets) and skip this
# template with `--set storageCredentials.manage=false` (default: true).
{{- if .Values.storageCredentials.manage | default true }}
apiVersion: v1
kind: Secret
metadata:
  name: sandbox-s3-credentials
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "boxkite.labels" . | nindent 4 }}
type: Opaque
stringData:
  access-key-id: {{ .Values.storageCredentials.accessKeyId | quote }}
  secret-access-key: {{ .Values.storageCredentials.secretAccessKey | quote }}
{{- end }}
